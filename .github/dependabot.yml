---
version: 2
updates:
  - directory: /
    open-pull-requests-limit: 5
    package-ecosystem: github-actions
    rebase-strategy: auto
    schedule:
      interval: weekly
      time: "04:00"
    assignees:
      - "Kampfmoehre"
  - directory: /
    groups:
      commitlint:
        patterns:
          - "@commitlint/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
    open-pull-requests-limit: 10
    package-ecosystem: npm
    rebase-strategy: auto
    schedule:
      interval: daily
      time: "04:00"
    assignees:
      - "Kampfmoehre"
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
